dep_type = "code"
hash_type = "data1"
data_hash = "0x8a89ae9b140960aa4cc4389b04ba1d4606d9251821cb0fa31baf5e6207a01e7a"
artifact_hash = "0x036aad492412142735deee7821e69ec8752db4fd52de1f87e0b51608bee7ff82"

[metadata]
protocol_family = "NovaSeal"
profile = "agreement-profile-v0"
status = "reviewable-ckb-native-agreement-skeleton"
oracle_dependency = "none"
margin_call_dependency = "none"
btc_utxo_mirror = "not-implemented"
