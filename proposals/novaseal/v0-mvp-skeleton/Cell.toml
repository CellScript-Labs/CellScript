[package]
name = "novaseal"
version = "0.0.1-v0-mvp"
authors = ["NovaSeal Design Team (skeleton)"]
description = "NovaSeal v0 MVP skeleton - BTC key/multisig authorised CKB Cell transitions (strict minimal slice)"
license = "MIT"
repository = ""
homepage = ""
documentation = ""
keywords = ["ckb", "btc", "btcfi", "novaseal", "cellscript"]
categories = ["protocol", "asset", "audit"]
cellscript_version = "0.16"
entry = "src/nova_state_type.cell"   # Primary type script entry for now; lock is separate module

source_roots = ["src"]
include = ["schemas/**/*", "proofs/**/*", "fixtures/**/*"]
exclude = []

[dependencies]

[dev_dependencies]

[build.dependencies]

[policy]
# v0 MVP is explicitly non-production until verifier TCB + full acceptance matrix exist
production = false
deny_fail_closed = false
deny_ckb_runtime = false
deny_runtime_obligations = false

[[deploy.ckb.cell_deps]]
name = "cellscript_btc_bip340_verifier_riscv"
role = "runtime_verifier"
verifier_id = "btc.bip340.v0"
ipc_abi = "cellscript-btc-bip340-ipc-v0"
out_point = "0x6418f34fa16dc691febc1ce3870ff411c0bf6600f53ff27f57ca9723ae1d2c31:0"
dep_type = "code"
hash_type = "data1"
data_hash = "0xa4edd80d53e92488b1841a5f0ee5196f07857c0c347c496bca7dba7f49020e27"
artifact_hash = "0xd0d1c14c811728c680d8646283cf7961dd850eebea856ac0e281fb493c4bc58d"

[metadata]
protocol_family = "NovaSeal"
canonical_schema = "NovaSealCanonicalV0"
canonical_schema_hash = "0xe9a157d0211d63586f2e9334878f8354f87d4786f94aa9e5ea163fed5360aec6"
package_role = "canonical-example"
v0_slice = "key-auth-cell-movement-only"
strict_acceptance_criteria = 9
btc_verifier_tcb = "external-delegate-required"
fiber_profile = "xudt-shape-only-skeleton"
molecule_alignment_gate = "schemas-are-source-of-truth"
stateful_dispatcher = "src/nova_state_lifecycle_type.cell:novaseal_lifecycle"
deployment_pinning = "local-devnet-pinned; public/shared attestation required for production"
wallet_signing_vectors = "target/novaseal-wallet-signing-vectors.json"
tcb_review_bundle = "target/novaseal-bip340-tcb-review.json"
production_gate = "target/novaseal-production-gates.json"
external_attestations = "proofs/public_shared_cell_dep_attestation.json;proofs/bip340_external_tcb_review_attestation.json"
